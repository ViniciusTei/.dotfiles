[colors]
# Dracula color palette
background = #282a36
foreground = #f8f8f3
indigo  = #6272a4
grey    = #43475a
pink    = #ff78c6
orange  = #ffb86c
green   = #50fa7b
cyan    = #8ae9fd
purple  = #bd93f8
red     = #ff5455
yellow  = #f1fa8c
blue    = #42A5F5
teal    = #00B19F
lime    = #B9C244
amber   = #FBC02D
brown   = #AC8476
blue-gray = #6D8895

good       = ${colors.green}
degraded   = ${colors.yellow}
bad        = ${colors.red}
accent     = ${colors.purple}

[bar/main]
monitor = ${env:MONITOR:}
position = bottom
bottom = true
width = 100%
height = 27
radius = 8
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
border-size = 0
padding-left = 1
padding-right = 1
module-margin-left = 1
module-margin-right = 1

font-0 = FiraCode Nerd Font:size=10;2
font-1 = FiraCode Nerd Font Mono:size=10;2

modules-left = i3 xwindow
modules-right = xkblayout net-check network bluetooth pulseaudio filesystem cpu memory battery date 

tray-position = right
tray-padding = 2
cursor-click = pointer
wm-restack = i3

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-focused = %index%
label-focused-background = ${colors.accent}
label-focused-foreground = ${colors.background}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-padding = 2

label-visible = %index%
label-visible-background = ${colors.blue-gray}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.bad}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.foreground}

[module/date]
type = internal/date
interval = 1
date = %A, %d/%m/%Y
time = %H:%M
label =  %date%   %time%

[module/xkblayout]
type = custom/script
exec = xkblayout-state print %s
interval = 2
label = 󰌌 %output%

[module/net-check]
type = custom/script
exec = bash ~/.scripts/network.sh
interval = 10
label = %output%

[module/network]
type = internal/network
interface = wlp6s0
interval = 3

format-connected = <label-connected>
label-connected = 󰤨  %essid%

format-disconnected = <label-disconnected>
label-disconnected = 󰤭  desconectado
label-disconnected-foreground = ${colors.bad}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = 󰕾 %percentage%%
label-volume-foreground = ${colors.foreground}
label-muted = 󰕿
label-muted-foreground = ${colors.degraded}
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-right = pactl set-sink-mute @DEFAULT_SINK@ toggle

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
low-at = 20
label-mounted = 󰋊 %percentage_used%% (%used%/%total%)
label-mounted-foreground = ${colors.foreground}
label-mounted-warn =  %percentage_used%% (%used%/%total%)
label-mounted-warn-foreground = ${colors.bad}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.bad}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰻠 "
format-prefix-foreground = ${colors.accent}
label = %percentage:2%%
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.accent}
label = %percentage_used%% (%mb_used%/%mb_total%)
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
battery = BAT1
adapter = AC
full-at = 98
poll-interval = 5

format-charging = <label-charging>
label-charging = 󰂄 %percentage%%
label-charging-foreground = ${colors.good}

format-discharging = <animation-discharging> <label-discharging>
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}

format-full = <label-full>
label-full = 󱊣 Full
label-full-foreground = ${colors.good}

animation-discharging-0 = 󱊡
animation-discharging-1 = 󱊢
animation-discharging-2 = 󱊣
animation-discharging-framerate = 500

[module/bluetooth]
type = custom/script
exec = bash -c 'dev=$(~/.scripts/btctl.sh connected | cut -d"|" -f2 | head -1); [ -n "$dev" ] && printf "󰂯 %s" "$dev" || echo "󰂲"'
interval = 5
label = %output%
click-left = ~/.scripts/bt-panel.py
